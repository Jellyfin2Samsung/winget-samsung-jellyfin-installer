name: bump-winget-samsung-jellyfin-installer

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  bump-winget:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check versions
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest=$(gh release view --repo Jellyfin2Samsung/samsung-jellyfin-installer --json tagName -q ".tagName" | sed 's/^v//')

          manifest="manifests/j/Jellyfin2Samsung/Jellyfin2Samsung/installer.yaml"
          if [ -f "$manifest" ]; then
            current=$(grep 'PackageVersion:' "$manifest" | head -1 | sed 's/PackageVersion:\s*//' | xargs)
          else
            current=""
          fi

          echo "Latest: $latest"
          echo "Current: $current"

          echo "latest=$latest" >> $GITHUB_OUTPUT
          echo "current=$current" >> $GITHUB_OUTPUT

      - name: Skip if up to date
        if: steps.versions.outputs.latest == steps.versions.outputs.current
        run: |
          echo "No new version. Skipping."
          exit 0

      - name: Download Windows zip from release
        if: steps.versions.outputs.latest != steps.versions.outputs.current
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TAG: v${{ steps.versions.outputs.latest }}
        run: |
          gh release download "$VERSION_TAG" \
            --repo Jellyfin2Samsung/samsung-jellyfin-installer \
            --pattern "*-win-x64.zip" \
            --output win.zip

          unzip win.zip -d publish

      - name: Install WiX
        if: steps.versions.outputs.latest != steps.versions.outputs.current
        run: dotnet tool install --global wix

      - name: Build MSI
        if: steps.versions.outputs.latest != steps.versions.outputs.current
        env:
          VERSION: ${{ steps.versions.outputs.latest }}
        run: |
          wix build installer/Product.wxs -o "Jellyfin2Samsung-v${VERSION}-win-x64.msi"

      - name: Upload MSI to release
        if: steps.versions.outputs.latest != steps.versions.outputs.current
        env:
          GH_TOKEN: ${{ secrets.MAIN_REPO_TOKEN }}
          VERSION_TAG: v${{ steps.versions.outputs.latest }}
          VERSION: ${{ steps.versions.outputs.latest }}
        run: |
          gh release upload "$VERSION_TAG" \
            "Jellyfin2Samsung-v${VERSION}-win-x64.msi" \
            --repo Jellyfin2Samsung/samsung-jellyfin-installer \
            --clobber

      - name: Submit to WinGet
        if: steps.versions.outputs.latest != steps.versions.outputs.current
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Jellyfin2Samsung.Jellyfin2Samsung
          version: ${{ steps.versions.outputs.latest }}
          release-tag: v${{ steps.versions.outputs.latest }}
          installers-regex: '\.msi$'
          fork-user: Jellyfin2Samsung
          token: ${{ secrets.WINGET_TOKEN }}

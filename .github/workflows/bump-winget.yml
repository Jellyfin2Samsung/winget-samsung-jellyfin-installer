name: bump-winget-samsung-jellyfin-installer

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force build/update/submit even when version already exists'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Run the full flow but skip MSI upload, manifest commit, and WinGet PR'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: bump-winget-samsung-jellyfin-installer
  cancel-in-progress: false

env:
  # Must match the committed extension at .wix/extensions/WixToolset.Util.wixext/<X>/wixext<N>/
  # (wixext6 -> WiX 6.x CLI). Bump intentionally when the committed extension is updated.
  WIX_VERSION: '6.0.2'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      latest: ${{ steps.versions.outputs.latest }}
      current: ${{ steps.versions.outputs.current }}
      has_update: ${{ steps.versions.outputs.has_update }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check versions
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          latest="$(
            gh release view \
              --repo Jellyfin2Samsung/Samsung-Jellyfin-Installer \
              --json tagName \
              -q ".tagName" |
            sed 's/^v//'
          )"

          if [ -z "$latest" ]; then
            echo "::error::Could not determine latest upstream version."
            exit 1
          fi

          manifest_root="manifests/j/Jellyfin2Samsung/Jellyfin2Samsung"

          if [ -d "$manifest_root" ]; then
            current="$(
              find "$manifest_root" -mindepth 1 -maxdepth 1 -type d \
                -printf '%f\n' |
              sort -V |
              tail -1
            )"
          else
            current=""
          fi

          echo "Latest:  $latest"
          echo "Current: ${current:-<none>}"

          echo "latest=$latest"   >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"

          # has_update iff latest != current AND latest sorts >= current.
          # This prevents accidental downgrades if upstream retags or deletes.
          highest="$(printf '%s\n%s\n' "$current" "$latest" | sort -V | tail -1)"

          if [ "$latest" != "$current" ] && [ "$highest" = "$latest" ]; then
            echo "has_update=true"  >> "$GITHUB_OUTPUT"
          else
            echo "has_update=false" >> "$GITHUB_OUTPUT"
          fi

  build-update-and-submit:
    runs-on: windows-latest
    needs: check
    if: needs.check.outputs.has_update == 'true' || github.event.inputs.force == 'true'
    timeout-minutes: 30

    steps:
      - name: Verify MAIN_REPO_TOKEN is available
        env:
          MAIN_REPO_TOKEN: ${{ secrets.MAIN_REPO_TOKEN }}
        shell: bash
        run: |
          if [ -z "$MAIN_REPO_TOKEN" ]; then
            echo "::error::MAIN_REPO_TOKEN is not set for this workflow."
            echo "Check repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          echo "MAIN_REPO_TOKEN is set."

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Default GITHUB_TOKEN is fine for read + pull.
          # The later push uses MAIN_REPO_TOKEN explicitly via URL.
          ref: main
          fetch-depth: 0

      - name: Download Windows zip from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TAG: v${{ needs.check.outputs.latest }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          gh release download "$env:VERSION_TAG" `
            --repo Jellyfin2Samsung/Samsung-Jellyfin-Installer `
            --pattern "*-win-x64.zip" `
            --output win.zip

          Expand-Archive win.zip -DestinationPath publish -Force

      - name: Cache WiX tool
        id: wix-cache
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/tools
          key: wix-${{ env.WIX_VERSION }}

      - name: Install WiX
        if: steps.wix-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          dotnet tool install --global wix --version $env:WIX_VERSION

      - name: Ensure WiX on PATH (cache hit)
        if: steps.wix-cache.outputs.cache-hit == 'true'
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_PATH "$env:USERPROFILE\.dotnet\tools"

      - name: Build MSI
        env:
          VERSION: ${{ needs.check.outputs.latest }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          wix build installer/Product.wxs `
            -arch x64 `
            -ext WixToolset.Util.wixext `
            -o "Jellyfin2Samsung-v$env:VERSION-win-x64.msi"

      - name: Compute MSI SHA256
        id: hash
        env:
          VERSION: ${{ needs.check.outputs.latest }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $msi = "Jellyfin2Samsung-v$env:VERSION-win-x64.msi"

          if (-not (Test-Path $msi)) {
            throw "MSI not found: $msi"
          }

          $hash = (Get-FileHash $msi -Algorithm SHA256).Hash.ToUpperInvariant()

          Write-Host "SHA256: $hash"
          "sha256=$hash" >> $env:GITHUB_OUTPUT

      - name: Create or update local WinGet manifests
        env:
          VERSION: ${{ needs.check.outputs.latest }}
          SHA256: ${{ steps.hash.outputs.sha256 }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $manifestRoot = "manifests/j/Jellyfin2Samsung/Jellyfin2Samsung"
          $newDir = Join-Path $manifestRoot $env:VERSION

          if (-not (Test-Path $manifestRoot)) {
            throw "Manifest root not found: $manifestRoot"
          }

          $oldDir = Get-ChildItem $manifestRoot -Directory |
            Where-Object { $_.Name -ne $env:VERSION } |
            Sort-Object { [version]$_.Name } |
            Select-Object -Last 1

          if (-not (Test-Path $newDir)) {
            if (-not $oldDir) {
              throw "No existing manifest version directory found in $manifestRoot"
            }

            Write-Host "Using previous manifest directory: $($oldDir.FullName)"
            Write-Host "Creating new manifest directory:  $newDir"

            New-Item -ItemType Directory -Force -Path $newDir | Out-Null
            Copy-Item "$($oldDir.FullName)\*.yaml" $newDir -Force
          } else {
            Write-Host "Manifest directory already exists, updating in place: $newDir"
          }

          $files = Get-ChildItem $newDir -Filter "*.yaml"

          if (-not $files) {
            throw "No YAML manifest files found in $newDir"
          }

          foreach ($file in $files) {
            Write-Host "Updating $($file.FullName)"

            $content = Get-Content $file.FullName -Raw

            $content = $content -replace 'PackageVersion:\s*.*', "PackageVersion: $env:VERSION"

            $content = $content -replace `
              'https://github\.com/Jellyfin2Samsung/Samsung-Jellyfin-Installer/releases/download/v[^/]+/Jellyfin2Samsung-v[^/]+-win-x64\.msi', `
              "https://github.com/Jellyfin2Samsung/Samsung-Jellyfin-Installer/releases/download/v$env:VERSION/Jellyfin2Samsung-v$env:VERSION-win-x64.msi"

            $content = $content -replace `
              'InstallerSha256:\s*.*', `
              "InstallerSha256: $env:SHA256"

            Set-Content -Path $file.FullName -Value $content
          }

          Write-Host "Updated manifest files:"
          Get-ChildItem $newDir -Filter "*.yaml" | ForEach-Object {
            Write-Host " - $($_.FullName)"
          }

      - name: Validate manifests with winget
        env:
          VERSION: ${{ needs.check.outputs.latest }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $newDir = "manifests/j/Jellyfin2Samsung/Jellyfin2Samsung/$env:VERSION"

          # winget validate exits 1 on any warning (even when the manifest
          # itself is valid). Microsoft's own winget-pkgs CI treats
          # "succeeded with warnings" as success, so we do the same.
          $output = & winget validate --manifest $newDir 2>&1 | Out-String
          Write-Host $output

          if ($LASTEXITCODE -eq 0) {
            Write-Host "Manifest validation passed."
            exit 0
          } elseif ($output -match 'Manifest validation succeeded') {
            Write-Warning "Manifest validation passed with warnings (treated as success)."
            exit 0
          } else {
            throw "Manifest validation failed (exit $LASTEXITCODE)."
          }

      - name: Upload MSI to release
        if: github.event.inputs.dry_run != 'true'
        env:
          # Cross-repo write: GITHUB_TOKEN is scoped to this repo only,
          # so uploading an asset to Samsung-Jellyfin-Installer needs the PAT.
          GH_TOKEN: ${{ secrets.MAIN_REPO_TOKEN }}
          VERSION_TAG: v${{ needs.check.outputs.latest }}
          VERSION: ${{ needs.check.outputs.latest }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          gh release upload "$env:VERSION_TAG" `
            "Jellyfin2Samsung-v$env:VERSION-win-x64.msi" `
            --repo Jellyfin2Samsung/Samsung-Jellyfin-Installer `
            --clobber

      - name: Commit updated local manifests
        if: github.event.inputs.dry_run != 'true'
        env:
          MAIN_REPO_TOKEN: ${{ secrets.MAIN_REPO_TOKEN }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add manifests/

          $changes = git diff --cached --name-only

          if (-not $changes) {
            Write-Host "No manifest changes to commit."
            exit 0
          }

          git commit -m "chore: add WinGet manifest for v${{ needs.check.outputs.latest }}"

          # Pull with the already-persisted GITHUB_TOKEN (fine for read).
          git pull --rebase origin main

          # Push with MAIN_REPO_TOKEN explicitly, without touching git config.
          $pushUrl = "https://x-access-token:$env:MAIN_REPO_TOKEN@github.com/${{ github.repository }}.git"
          git push $pushUrl HEAD:main

      - name: Submit to WinGet
        if: github.event.inputs.dry_run != 'true'
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Jellyfin2Samsung.Jellyfin2Samsung
          version: ${{ needs.check.outputs.latest }}
          release-tag: v${{ needs.check.outputs.latest }}
          release-repository: Samsung-Jellyfin-Installer
          installers-regex: '\.msi$'
          fork-user: Jellyfin2Samsung
          token: ${{ secrets.MAIN_REPO_TOKEN }}

      - name: Dry run summary
        if: github.event.inputs.dry_run == 'true'
        shell: pwsh
        run: |
          Write-Host "=============================================="
          Write-Host " DRY RUN - no side effects were performed"
          Write-Host "=============================================="
          Write-Host "Version:        ${{ needs.check.outputs.latest }}"
          Write-Host "MSI SHA256:     ${{ steps.hash.outputs.sha256 }}"
          Write-Host "Skipped steps:"
          Write-Host "  - Upload MSI to GitHub release"
          Write-Host "  - Commit manifest to main"
          Write-Host "  - Submit PR to microsoft/winget-pkgs"

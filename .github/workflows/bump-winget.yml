name: bump-winget-samsung-jellyfin-installer

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      latest: ${{ steps.versions.outputs.latest }}
      current: ${{ steps.versions.outputs.current }}
      has_update: ${{ steps.versions.outputs.has_update }}

    steps:
      - uses: actions/checkout@v4

      - name: Check versions
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest=$(gh release view --repo Jellyfin2Samsung/samsung-jellyfin-installer --json tagName -q ".tagName" | sed 's/^v//')

          manifest="manifests/j/Jellyfin2Samsung/Jellyfin2Samsung/installer.yaml"
          if [ -f "$manifest" ]; then
            current=$(grep 'PackageVersion:' "$manifest" | head -1 | sed 's/PackageVersion:\s*//' | xargs)
          else
            current=""
          fi

          echo "Latest: $latest"
          echo "Current: $current"

          echo "latest=$latest" >> $GITHUB_OUTPUT
          echo "current=$current" >> $GITHUB_OUTPUT

          if [ "$latest" != "$current" ]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
          fi

  build-and-submit:
    runs-on: windows-latest
    needs: check
    if: needs.check.outputs.has_update == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows zip from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TAG: v${{ needs.check.outputs.latest }}
        run: |
          gh release download "$env:VERSION_TAG" `
            --repo Jellyfin2Samsung/samsung-jellyfin-installer `
            --pattern "*-win-x64.zip" `
            --output win.zip

          Expand-Archive win.zip -DestinationPath publish
        shell: pwsh

      - name: Install WiX
        run: dotnet tool install --global wix

      - name: Build MSI
        env:
          VERSION: ${{ needs.check.outputs.latest }}
        run: wix build installer/Product.wxs -o "Jellyfin2Samsung-v$env:VERSION-win-x64.msi"
        shell: pwsh

      - name: Upload MSI to release
        env:
          GH_TOKEN: ${{ secrets.MAIN_REPO_TOKEN }}
          VERSION_TAG: v${{ needs.check.outputs.latest }}
          VERSION: ${{ needs.check.outputs.latest }}
        run: |
          gh release upload "$env:VERSION_TAG" `
            "Jellyfin2Samsung-v$env:VERSION-win-x64.msi" `
            --repo Jellyfin2Samsung/Samsung-Jellyfin-Installer `
            --clobber
        shell: pwsh

      - name: Submit to WinGet
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Jellyfin2Samsung.Jellyfin2Samsung
          version: ${{ needs.check.outputs.latest }}
          release-tag: v${{ needs.check.outputs.latest }}
          installers-regex: '\.msi$'
          fork-user: Jellyfin2Samsung
          token: ${{ secrets.WINGET_TOKEN }}
